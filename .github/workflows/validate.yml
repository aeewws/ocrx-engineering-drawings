name: Validate

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Validate Python syntax
        run: python -m py_compile tools/ocrx.py

      - name: Validate PowerShell scripts
        shell: pwsh
        run: |
          $null = [scriptblock]::Create((Get-Content .\scripts\install-codex.ps1 -Raw))
          $null = [scriptblock]::Create((Get-Content .\install-online.ps1 -Raw))

      - name: Validate install-online parameters
        shell: pwsh
        run: |
          $command = Get-Command .\install-online.ps1
          $expected = @('ReleaseZipUrl', 'CodexHome', 'CodexBin', 'EnvName', 'SkipAgentsHint')
          foreach ($name in $expected) {
            if (-not $command.Parameters.ContainsKey($name)) {
              throw "install-online.ps1 is missing expected parameter: $name"
            }
          }

      - name: Smoke test install-online forwarding
        shell: pwsh
        run: |
          .\tests\Test-InstallOnline.ps1
